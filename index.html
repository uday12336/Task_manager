<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Manager</h1>
            <div id="user-info" style="display: none; margin-bottom: 10px;">
                <span id="welcome-msg" style="font-weight: 600; color: #2c3e50;"></span>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
            <div id="current-date-time"></div>
        </header>

        <div id="auth-container">
            <div class="form-toggle">
                <button id="show-login" class="active">Login</button>
                <button id="show-signup">Sign Up</button>
            </div>

            <div id="login-form" class="auth-form">
                <input type="text" id="login-username" placeholder="Username">
                <input type="password" id="login-password" placeholder="Password">
                <button id="login-btn">Login</button>
                <p id="login-error" class="error-msg"></p>
            </div>

            <div id="signup-form" class="auth-form" style="display: none;">
                <input type="text" id="signup-username" placeholder="Choose Username">
                <input type="password" id="signup-password" placeholder="Choose Password">
                <button id="signup-btn">Sign Up</button>
                <p id="signup-error" class="error-msg"></p>
                <p id="signup-success" class="success-msg"></p>
            </div>
            
            <p class="developer-credit">Developed by Uday Pratap Singh</p>
        </div>

        <div class="main-content" id="main-content" style="display: none;">
            <a href="calendar.html" class="feature-link">Calendar</a>
            <a href="todo.html" class="feature-link">To-Do List</a>
            <a href="planner.html" class="feature-link">Daily Planner</a>
            <a href="notes.html" class="feature-link">Notes</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
